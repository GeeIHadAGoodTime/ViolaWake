# Alembic configuration for ViolaWake Console backend.
#
# The database URL is NOT stored here — it is read from app.config.settings
# in alembic/env.py so that the same VIOLAWAKE_DB_URL / VIOLAWAKE_DB_PATH
# environment variables govern both the application and migrations.

[alembic]
script_location = alembic
prepend_sys_path = .

# Template for new migration files.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Truncate long revision slugs to keep filenames reasonable.
truncate_slug_length = 40

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
